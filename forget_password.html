<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Forgot Password</title>
  <style>
    *{
      padding:0;
      margin:0;
      box-sizing:border-box;
    }

    body{
      min-height:100vh;
      background:radial-gradient(ellipse at top, #0f0c29 0%, #030116 40%, #01010aea 100%);
      display:flex;
      align-items:center;
      justify-content:center;
      color:white;
    }

    .fp{
      position: relative;
      min-height:350px;
      width:400px;
      background: rgba(64, 3, 3, 0.05);
      backdrop-filter: blur(10px);
      border-radius:15px;
      box-shadow: 0px 0px 30px rgba(252, 249, 247, 0.1);
      padding:30px 50px;
      color:white;
    }
    h2{
      margin:10px;
      text-align:center;
      color:orange;
    }
    input[type=email], input[type=password], input[type=text]{
      padding:2px 2px;
      align-items:center;
      justify-content:center;
      width:100%;
      margin-bottom:15px;
      border-radius:10px;
      height:40px;
      background: #1a1a2e;
      box-shadow: inset 0 0 5px #333;
      color:white;
      
    }
    
    .password-container {
      position: relative;
      margin-bottom: 15px;
    }

    .toggle-password {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-80%);
      cursor: pointer;
      color: #ccc;
      
      font-size: 18px;
      
    }
    .toggle-password:hover {
      color: orange;
    }

    button{
      width: 100%;
      height:40px;
      border-radius:20px;
      background-color:orange;
      border:none;
      cursor: pointer;
      font-weight: bold;
      font-size: 16px;
    }

   
    input:focus {
      outline: none;
      border: 1px solid orange;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="fp">
      <h2>Reset Password</h2>
      <form method="POST" action="save_user.php">
        <label for="email">Email</label>
        <input type="email" name="email" id="email" required />

        <label for="otp">Enter OTP</label>
        <input type="text" name="otp" id="otp" required />

        <label for="new_password">New Password</label>
        <div class="password-container">
          <input type="password" name="new_password" id="new_password" required />
          <span class="toggle-password" onclick="togglePassword('new_password', this)">👁️</span>
        </div>

        <label for="confirm_password">Confirm Password</label>
        <div class="password-container">
          <input type="password" name="confirm_password" id="confirm_password" required />
          <span class="toggle-password" onclick="togglePassword('confirm_password', this)">👁️</span>
        </div>

        <button type="submit">Reset Password</button>
      </form>
    </div>
  </div>

  <script>
    function togglePassword(inputId, toggleSpan) {
      const input = document.getElementById(inputId);
      if (input.type === "password") {
        input.type = "text";
        toggleSpan.textContent = "🙈";  
      } else {
        input.type = "password";
        toggleSpan.textContent = "👁️";  
      }
    }
  </script>

</body>
</html>
